<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的智能排程鬧鐘</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background-color: #eef2f5; color: #333; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .section { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .section:last-child { border-bottom: none; }
        input[type="time"], input[type="text"], textarea, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        textarea { resize: vertical; height: 150px; font-family: monospace; }
        button { background-color: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:hover { background-color: #0056b3; }
        #permission-btn { background-color: #28a745; margin-bottom: 5px; }
        #permission-btn:hover { background-color: #218838; }
        .btn-batch { background-color: #6f42c1; }
        .btn-batch:hover { background-color: #59339d; }
        #alarms-list ul { padding-left: 20px; }
        li { margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top: 0;">⏰ 智能排程鬧鐘系統</h2>
    
    <!-- 權限區塊 -->
    <div class="section" style="text-align: center;">
        <button id="permission-btn" onclick="requestSystemPermission()">允許「系統通知」權限</button>
        <div id="permission-status" style="font-size: 13px; color: gray;">狀態：檢查中...</div>
    </div>

    <!-- 模式一：單次精確設定 -->
    <div class="section">
        <h3>🔹 單次設定</h3>
        <label>設定指定時間 (時:分:秒)：</label>
        <input type="time" id="exact-time" step="1"> <!-- step="1" 允許選擇秒數 -->
        <input type="text" id="single-message" placeholder="提醒內容 (例如: 準備上課)">
        <button onclick="setSingleAlarm()">加入鬧鐘</button>
    </div>

    <!-- 模式二：批次與習慣記憶 -->
    <div class="section">
        <h3>⚡ 一鍵批次設定 (習慣記憶)</h3>
        <label style="font-size: 14px; color: #555;">每行輸入一個鬧鐘，格式為 <b>HH:MM:SS 提醒內容</b>。系統會自動記憶你的清單！</label>
        <textarea id="batch-input" placeholder="08:50:00 準備看盤&#10;09:00:00 台股開盤&#10;13:30:00 台股收盤&#10;20:00:00 Python 專案開發"></textarea>
        <button class="btn-batch" onclick="setBatchAlarms()">一鍵設定全部</button>
    </div>

    <!-- 鬧鐘列表 -->
    <div id="alarms-list" class="section">
        <h3>📋 目前排程的鬧鐘：</h3>
        <ul id="list"></ul>
    </div>
</div>

<script>
    // --- 系統權限與初始化 ---
    window.onload = function() {
        checkPermissionStatus();
        loadSavedHabits();
    };

    function checkPermissionStatus() {
        const statusText = document.getElementById('permission-status');
        const btn = document.getElementById('permission-btn');
        if (!("Notification" in window)) {
            statusText.innerText = "❌ 你的瀏覽器不支援系統通知";
            statusText.style.color = "red";
            btn.style.display = 'none';
        } else if (Notification.permission === "granted") {
            statusText.innerText = "✅ 系統通知已開啟";
            statusText.style.color = "green";
            btn.style.display = 'none';
        } else {
            statusText.innerText = "⚠️ 請點擊上方按鈕允許通知";
        }
    }

    function requestSystemPermission() {
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                checkPermissionStatus();
                if (permission === "granted") new Notification("✅ 系統通知已啟用！");
            });
        }
    }

    // --- 核心時間計算邏輯 ---
    function calculateDelay(targetTimeStr) {
        const now = new Date();
        const [hours, minutes, seconds] = targetTimeStr.split(':').map(Number);
        
        let target = new Date();
        target.setHours(hours, minutes, seconds || 0, 0);

        // 如果設定的時間已經過了，自動排到「明天」的同一時間
        if (target.getTime() <= now.getTime()) {
            target.setDate(target.getDate() + 1);
        }
        
        return {
            delayMs: target.getTime() - now.getTime(),
            displayTime: target.toLocaleTimeString('zh-TW')
        };
    }

    // --- 觸發鬧鐘 ---
    function triggerSystemAlarm(message) {
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        audio.play().catch(e => console.log("音效播放被阻擋", e));

        if ("Notification" in window && Notification.permission === "granted") {
            const notification = new Notification("⏰ 時間到！", {
                body: message,
                icon: "https://cdn-icons-png.flaticon.com/512/864/864326.png"
            });
            notification.onclick = function() { window.focus(); this.close(); };
        } else {
            alert("⏰ 時間到：" + message);
        }
    }

    // --- 畫面更新與計時器註冊 ---
    function registerAlarm(timeStr, message) {
        const { delayMs, displayTime } = calculateDelay(timeStr);
        
        const list = document.getElementById('list');
        const listItem = document.createElement('li');
        listItem.innerText = `[${displayTime}] ${message}`;
        list.appendChild(listItem);

        setTimeout(() => {
            triggerSystemAlarm(message);
            listItem.style.textDecoration = 'line-through';
            listItem.style.color = 'gray';
        }, delayMs);
    }

    // --- 單次設定 ---
    function setSingleAlarm() {
        const timeVal = document.getElementById('exact-time').value; // 格式如 14:30 或 14:30:15
        const message = document.getElementById('single-message').value;

        if (!timeVal || !message) {
            alert("請選擇時間並輸入提醒內容！");
            return;
        }
        
        // 確保時間格式有秒數
        const formattedTime = timeVal.split(':').length === 2 ? `${timeVal}:00` : timeVal;
        registerAlarm(formattedTime, message);
        
        document.getElementById('exact-time').value = '';
        document.getElementById('single-message').value = '';
    }

    // --- 批次設定與習慣記憶 ---
    function setBatchAlarms() {
        const batchText = document.getElementById('batch-input').value;
        if (!batchText.trim()) {
            alert("請輸入批次鬧鐘清單！");
            return;
        }

        // 儲存使用者的習慣清單到瀏覽器本地
        localStorage.setItem('myAlarmHabits', batchText);

        const lines = batchText.split('\n');
        let addedCount = 0;

        lines.forEach(line => {
            line = line.trim();
            if (!line) return;

            // 解析格式：取第一段為時間，後面的全部為內容
            const parts = line.split(/\s+/);
            if (parts.length >= 2) {
                const timeVal = parts[0];
                const message = parts.slice(1).join(' ');
                
                // 簡易檢查時間格式 (需包含冒號)
                if (timeVal.includes(':')) {
                    const formattedTime = timeVal.split(':').length === 2 ? `${timeVal}:00` : timeVal;
                    registerAlarm(formattedTime, message);
                    addedCount++;
                }
            }
        });

        if (addedCount > 0) {
            alert(`✅ 成功一鍵設定 ${addedCount} 個鬧鐘！`);
        } else {
            alert("⚠️ 無法解析格式，請確保每行格式為「時間 內容」，例如：09:00:00 測試");
        }
    }

    // --- 載入記憶的習慣 ---
    function loadSavedHabits() {
        const saved = localStorage.getItem('myAlarmHabits');
        if (saved) {
            document.getElementById('batch-input').value = saved;
        } else {
            // 如果是第一次使用，給予預設範本
            document.getElementById('batch-input').value = 
                "08:50:00 準備看盤\n09:00:00 台股開盤\n13:30:00 台股收盤\n20:00:00 Python 專案開發\n23:00:00 休息時間";
        }
    }
</script>

</body>
</html>
